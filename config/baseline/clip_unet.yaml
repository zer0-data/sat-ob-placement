defaults:
  - override hydra/hydra_logging: disabled
  - override hydra/job_logging: disabled
  - _self_

hydra:
  output_subdir: null
  run:
    dir: .

dataset:
  name: "semantic_placement"
  root_dir: "data/datasets/semantic_placement/"
  val_dir: "data/datasets/floorplanner_inpainting_v5/"
  train_transforms: "segmentation_base"
  val_transforms: "segmentation_base"
  # Switch to RemoteCLIP prompt-conditioned embeddings once generated:
  #   python scripts/generate_remote_clip_embeddings.py --input ... --output ...
  # Use "clip_embeddings.pkl" to fall back to original OpenAI CLIP embeddings.
  embeddings_file: "remote_clip_embeddings.pkl"

  transform_args:
    resize_prob: 0.0
    random_resize_crop_prob: 0.0
    resized_resolution: 
      - 512
      - 512

training:
  trainer: "semantic_placement"
  epochs: 25

  optimizer: "SGD"
  lr: 0.001
  weight_decay: 0.05
  layer_decay: 0.75

  batch_size: 8
  save_interval: 100
  log_interval: 10

  lr_scheduler:
    name: "StepLR"
    warmup_epochs: 5
    step_decay: 10
    min_lr: 1e-5
    gamma: 0.99

  discriminator:
    lr: 0.0005
    loss_weight: 0.2

  pretrained: false
  pretrained_checkpoint: null

  dataset:
    num_workers: 4
    load_original_img: false

  loss:
    name: "soft_dice"
    soft_dice:
      eps: 1e-7
    mae_reconstruction:
      norm_pix_loss: false
      patch_size:
        - 16
        - 16
      recon_weight: 0.5
      clip_weight: 0.5
      mean_over_samples: false
      clip_loss: "l2"

  eval_with_tta: false
  eval_splits:
    - "val"

model:
  # Original OpenAI CLIP UNet:
  #   name: "clip_unet"
  # RemoteCLIP RN50 (drop-in, same decoder architecture):
  name: "remote_clip_unet"
  type: "clip"
  pretrained_checkpoint: null

  add_discriminator: false

  image_size: 224

  # Normalization constants — same as OpenAI CLIP / OpenCLIP RN50
  rgb_means:
    - 0.48145466
    - 0.4578275
    - 0.40821073
  rgb_stds:
    - 0.26862954
    - 0.26130258
    - 0.27577711

  clip:
    # Must be in "RN50" or "RN50x16" (used only when model.name is "clip_unet")
    model_type: "RN50"

  # --- RemoteCLIP settings (used when model.name starts with "remote_clip") ---
  remote_clip:
    # Architecture: "RN50" | "ViT-B-32" | "ViT-L-14"
    model_type: "RN50"
    # Path to downloaded RemoteCLIP checkpoint.
    # Download: python -c "from huggingface_hub import hf_hub_download;
    #   hf_hub_download(repo_id='chendelong/RemoteCLIP',
    #   filename='RemoteCLIP-RN50.pt', local_dir='data/pretrained_models')"
    checkpoint_path: "data/pretrained_models/RemoteCLIP-RN50.pt"

    # --- Prompt Engineering: satellite-domain text templates ---
    # Used by RemoteCLIPTextEncoder for both on-the-fly encoding and
    # the generate_remote_clip_embeddings.py script.
    # Each template must contain {c} as the category placeholder.
    text_templates:
      - "an aerial view of a {c}"
      - "a satellite image of a {c}"
      - "a top-down view of a {c}"
      - "a remote sensing image of a {c}"
      - "a bird's eye view of a {c}"

# -------------------------------------------------------------------
# Terrain Guardrailing (VocAda-Inspired Validity Mask)
# -------------------------------------------------------------------
terrain_filter:
  # Master toggle — set to false to disable all terrain filtering
  enabled: true

  segmentor:
    # HuggingFace SegFormer checkpoint (auto-cached, ~15 MB for mit-b0)
    model_name: "nvidia/segformer-b0-finetuned-ade-512-512"
    # Fallback if transformers is unavailable: "clip_zero_shot" | "none"
    fallback: "clip_zero_shot"
    # ADE20K label → canonical terrain ID remap table
    ade20k_remap_path: "data/metadata/ade20k_to_terrain.json"

  # Path to the military-class deployment constraints file
  constraints_path: "data/metadata/deployment_constraints.json"

  morphology:
    # Pixels to dilate forbidden zone boundaries (prevents heatmap leakage)
    dilation_px: 5
    # Warn when valid area fraction drops below this threshold
    min_valid_area_frac: 0.05

  # If false, terrain mask is ONLY applied at eval/inference, not during training.
  apply_during_training: false

distributed:
  backend: "GLOO"
  # The machine_id of this node
  machine_id: 0

  # IP and port of the head distrubted process
  ip_and_port: 127.0.0.1:0

  # Number of distributed nodes
  nodes: 1

visualization:
  interval: 5
  visualize: false
  save_observations: false
  sample_size: 100
  output_dir: "outputs/visual_reasoner/frames/"
  save_separate_masks: false
  metrics_dir: ""

wandb:
  entity: axel81
  project: visual-reasoner
  name: null
  job_type: train

run_type: "train"

checkpoint_dir: "outputs/visual_reasoner/checkpoints/semantic_placement/"
log_dir: "outputs/visual_reasoner/logs/semantic_placement/"

seed: 42
